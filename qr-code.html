<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jagdamb Laundry - QR Code</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a1a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(108, 99, 255, 0.3);
        }
        .brand { font-size: 1.5rem; font-weight: 800; color: #1a1a2e; margin-bottom: 6px; }
        .tagline { font-size: 0.85rem; color: #888; margin-bottom: 24px; }
        .logo-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 14px; border: 3px solid #d4af37; box-shadow: 0 4px 20px rgba(212,175,55,0.3); }
        #qrcode { display: flex; justify-content: center; margin-bottom: 20px; }
        #qrcode canvas { border-radius: 12px; }
        .scan-text { font-size: 0.95rem; color: #555; font-weight: 600; margin-bottom: 6px; }
        .url-text { font-size: 0.7rem; color: #aaa; word-break: break-all; margin-bottom: 24px; }
        .btn-download {
            background: linear-gradient(135deg, #6C63FF, #4A42E0);
            color: #fff;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-download:hover { transform: translateY(-2px); }
        @media print {
            body { background: #fff; }
            .btn-download { display: none; }
            .card { box-shadow: none; border: 2px solid #eee; }
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="logo.jpg" alt="Jagdamb Laundry Logo" class="logo-img">
        <div class="brand">Jagdamb Laundry & Drycleaners</div>
        <div class="tagline">Clean Care • Royal Wear ✨</div>
        <div id="qrcode"></div>
        <div class="scan-text">📱 Scan this QR Code</div>
        <div class="url-text">jagdamblaundry.vercel.app</div>
        <button class="btn-download" onclick="downloadQR()">⬇️ Download QR Code</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        const qr = new QRCode(document.getElementById("qrcode"), {
            text: "https://jagdamblaundry.vercel.app/",
            width: 260,
            height: 260,
            colorDark: "#1a1a2e",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        function downloadQR() {
            setTimeout(() => {
                const canvas = document.querySelector('#qrcode canvas');
                const link = document.createElement('a');
                link.download = 'jagdamb-laundry-qr.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }, 100);
        }
    </script>
</body>
</html>
